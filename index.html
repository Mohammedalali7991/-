<!-- 1. رابط مكتبة الأيقونات الاحترافية -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<!-- 2. حاوية أيقونات التواصل الاجتماعي للزبون -->
<div id="stadiumSocialsBox" style="margin-top: 25px; padding: 15px; background: #fff; border-radius: 8px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.05); display: none; direction: rtl; font-family: sans-serif;">
    <h4 style="margin-top: 0; color: #2c3e50;">تواصل مع إدارة الملعب مباشرة</h4>
    <div id="socialButtons" style="display: flex; justify-content: space-around; flex-wrap: wrap; gap: 10px; margin-top: 15px;"></div>
</div>

<!-- 3. حاوية جدول الساعات الـ 24 التفاعلي الملون -->
<div id="stadiumHoursContainer" style="margin-top: 25px; padding: 20px; background: #fff; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); direction: rtl; font-family: sans-serif;">
    <h3 style="color: #2c3e50; text-align: center;"><i class="fa-regular fa-clock" style="color: #2a5298;"></i> جدول مواعيد الحجز (24 ساعة)</h3>
    <p style="text-align: center; color: #7f8c8d; font-size: 14px;">اللون <span style="color: #2ecc71; font-weight: bold;">الأخضر</span> متاح، واللون <span style="color: #e74c3c; font-weight: bold;">الأحمر</span> محجوز</p>
    
    <label style="font-weight: bold;">اختر اليوم لعرض المواعيد:</label>
    <select id="bookingDaySelect" style="width: 100%; padding: 12px; margin-top: 5px; margin-bottom: 20px; border-radius: 6px; border: 1px solid #ccc;">
        <option value="السبت">السبت</option>
        <option value="الأحد">الأحد</option>
        <option value="الاثنين">الاثنين</option>
        <option value="الثلاثاء">الثلاثاء</option>
        <option value="الأربعاء">الأربعاء</option>
        <option value="الخميس">الخميس</option>
        <option value="الجمعة">الجمعة</option>
    </select>

    <div id="hoursGrid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 12px;"></div>
</div>

<!-- 4. الصندوق المنبثق لاختيار نوع الحجز (اليوم فقط / دائماً) -->
<div id="bookingModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 1000; direction: rtl; font-family: sans-serif;">
    <div style="background: white; padding: 25px; border-radius: 10px; width: 90%; max-width: 400px; text-align: center;">
        <h4 id="modalHourTitle" style="margin-top: 0; color: #2c3e50;">تأكيد حجز الساعة</h4>
        <p style="color: #7f8c8d;">يرجى تحديد نوع التكرار المطلوب لهذا الحجز:</p>
        <button id="btnBookToday" style="width: 100%; padding: 12px; background: #3498db; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; margin-bottom: 10px;">اليوم فقط (ينتهي تلقائياً)</button>
        <button id="btnBookPermanent" style="width: 100%; padding: 12px; background: #e67e22; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; margin-bottom: 10px;">دائماً (حجز ثابت أسبوعياً)</button>
        <button onclick="closeBookingModal()" style="width: 100%; padding: 10px; background: #95a5a6; color: white; border: none; border-radius: 6px; cursor: pointer;">إلغاء</button>
    </div>
</div>

<!-- 5. العمليات البرمجية الذكية المشتركة -->
<script type="module">
    import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { db, createBooking } from 'app.js';

    const stadiumId = "field_1"; 
    const playerId = "current_player_123"; 
    let selectedHourToBook = null;

    // جلب حسابات التواصل الاجتماعي وعرضها
    async function loadStadiumSocialMedia(id) {
        try {
            const stadiumRef = doc(db, "stadiums", id);
            const stadiumDoc = await getDoc(stadiumRef);
            if (!stadiumDoc.exists()) return;

            const data = stadiumDoc.data();
            const socials = data.socialLinks;
            const container = document.getElementById('socialButtons');
            container.innerHTML = ""; 

            let hasSocials = false;
            const btnStyle = "text-decoration: none; font-weight: bold; padding: 10px 15px; border-radius: 5px; display: flex; align-items: center; gap: 8px; color: white; min-width: 110px; justify-content: center;";

            if (socials) {
                if (socials.whatsapp) { hasSocials = true; container.innerHTML += `<a href="${socials.whatsapp}" target="_blank" style="${btnStyle} background-color: #25D366;"><i class="fa-brands fa-whatsapp"></i> واتساب</a>`; }
                if (socials.instagram) { hasSocials = true; container.innerHTML += `<a href="${socials.instagram}" target="_blank" style="${btnStyle} background-color: #E1306C;"><i class="fa-brands fa-instagram"></i> إنستغرام</a>`; }
                if (socials.facebook) { hasSocials = true; container.innerHTML += `<a href="${socials.facebook}" target="_blank" style="${btnStyle} background-color: #1877F2;"><i class="fa-brands fa-facebook-f"></i> فيسبوك</a>`; }
                if (socials.tiktok) { hasSocials = true; container.innerHTML += `<a href="${socials.tiktok}" target="_blank" style="${btnStyle} background-color: #000000;"><i class="fa-brands fa-tiktok"></i> تيك توك</a>`; }
            }
            document.getElementById('stadiumSocialsBox').style.display = hasSocials ? 'block' : 'none';
        } catch (e) { console.error(e); }
    }

    // جلب وتوليد شبكة الساعات الـ 24 وتلوينها
    async function renderHoursGrid(id, dayName) {
        const grid = document.getElementById('hoursGrid');
        grid.innerHTML = "<p style='grid-column: 1/-1; text-align: center;'>جاري تحميل المواعيد...</p>";
        try {
            const pricingRef = doc(db, "stadiums", id, "pricing", dayName);
            const pricingSnap = await getDoc(pricingRef);
            grid.innerHTML = ""; 

            for (let h = 0; h < 24; h++) {
                let hourData = { price: "غير محدد", isBooked: false };
                if (pricingSnap.exists() && pricingSnap.data()[`hour_${h}`]) {
                    hourData = pricingSnap.data()[`hour_${h}`];
                }

                const hourCard = document.createElement('div');
                const isBooked = hourData.isBooked || false;
                
                hourCard.style.cssText = `padding: 15px 10px; border-radius: 8px; text-align: center; color: white; font-weight: bold; cursor: ${isBooked ? 'not-allowed' : 'pointer'}; background-color: ${isBooked ? '#e74c3c' : '#2ecc71'}; box-shadow: 0 2px 5px rgba(0,0,0,0.1);`;

                const displayTime = `${h % 12 === 0 ? 12 : h % 12}:00 ${h >= 12 ? 'مساءً' : 'صباحاً'}`;
                hourCard.innerHTML = `<div>${displayTime}</div><div style="font-size: 11px; margin-top: 5px; opacity: 0.9;">${hourData.price} د.ع</div>`;

                if (!isBooked) {
                    hourCard.addEventListener('click', () => openBookingModal(h, displayTime));
                }
                grid.appendChild(hourCard);
            }
        } catch (error) { console.error(error); }
    }

    function openBookingModal(hourNumber, timeLabel) {
        selectedHourToBook = hourNumber;
        document.getElementById('modalHourTitle').textContent = `تأكيد حجز الساعة (${timeLabel})`;
        document.getElementById('bookingModal').style.display = 'flex';
    }

    window.closeBookingModal = function() { document.getElementById('bookingModal').style.display = 'none'; }

    document.getElementById('btnBookToday').addEventListener('click', async () => {
        const day = document.getElementById('bookingDaySelect').value;
        const res = await createBooking(stadiumId, playerId, day, selectedHourToBook, "today");
        alert(res.message); closeBookingModal(); renderHoursGrid(stadiumId, day);
    });

    document.getElementById('btnBookPermanent').addEventListener('click', async () => {
        const day = document.getElementById('bookingDaySelect').value;
        const res = await createBooking(stadiumId, playerId, day, selectedHourToBook, "permanent");
        alert(res.message); closeBookingModal(); renderHoursGrid(stadiumId, day);
    });

    document.getElementById('bookingDaySelect').addEventListener('change', () => {
        renderHoursGrid(stadiumId, document.getElementById('bookingDaySelect').value);
    });

    // استدعاء البيانات عند الفتح أول مرة
    loadStadiumSocialMedia(stadiumId);
    renderHoursGrid(stadiumId, "السبت");
</script>
