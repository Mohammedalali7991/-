<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<!-- حاوية أيقونات التواصل الاجتماعي الاحترافية للزبون -->
<div id="stadiumSocialsBox" style="margin-top: 25px; padding: 15px; background: #fff; border-radius: 8px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.05); display: none; direction: rtl; font-family: sans-serif;">
    <h4 style="margin-top: 0; color: #2c3e50;">تواصل مع إدارة الملعب مباشرة</h4>
    <div id="socialButtons" style="display: flex; justify-content: space-around; flex-wrap: wrap; gap: 10px; margin-top: 15px;"></div>
</div>

<script type="module">
import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
import { db } from './app.js'; 

async function loadStadiumSocialMedia(stadiumId) {
    try {
        const stadiumRef = doc(db, "stadiums", stadiumId);
        const stadiumDoc = await getDoc(stadiumRef);
        if (!stadiumDoc.exists()) return;

        const data = stadiumDoc.data();
        const socials = data.socialLinks;
        const container = document.getElementById('socialButtons');
        container.innerHTML = ""; 

        let hasSocials = false;
        const btnStyle = "text-decoration: none; font-weight: bold; padding: 10px 15px; border-radius: 5px; display: flex; align-items: center; gap: 8px; color: white; min-width: 110px; justify-content: center;";

        if (socials) {
            if (socials.whatsapp) {
                hasSocials = true;
                container.innerHTML += `<a href="${socials.whatsapp}" target="_blank" style="${btnStyle} background-color: #25D366;"><i class="fa-brands fa-whatsapp"></i> واتساب</a>`;
            }
            if (socials.instagram) {
                hasSocials = true;
                container.innerHTML += `<a href="${socials.instagram}" target="_blank" style="${btnStyle} background-color: #E1306C;"><i class="fa-brands fa-instagram"></i> إنستغرام</a>`;
            }
            if (socials.facebook) {
                hasSocials = true;
                container.innerHTML += `<a href="${socials.facebook}" target="_blank" style="${btnStyle} background-color: #1877F2;"><i class="fa-brands fa-facebook-f"></i> فيسبوك</a>`;
            }
            if (socials.tiktok) {
                hasSocials = true;
                container.innerHTML += `<a href="${socials.tiktok}" target="_blank" style="${btnStyle} background-color: #000000;"><i class="fa-brands fa-tiktok"></i> تيك توك</a>`;
            }
        }

        document.getElementById('stadiumSocialsBox').style.display = hasSocials ? 'block' : 'none';
    } catch (error) {
        console.error("خطأ برمي أثناء التحميل للزبون:", error);
    }
}

// تشغيل جلب البيانات تلقائياً للملعب الأول
loadStadiumSocialMedia('field_1');
</script>
