<div style="background: #fff; padding: 20px; margin-top: 20px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: right; direction: rtl; font-family: sans-serif;">
    <h3><i class="fa-solid fa-share-nodes" style="color: #2a5298;"></i> روابط التواصل للملعب (اسم الحساب فقط)</h3>
    <label for="stadiumUsername">اسم مستخدم الملعب بالتطبيق:</label>
    <input type="text" id="stadiumUsername" placeholder="مثال: baghdad_stadium" required style="width: 100%; padding: 10px; margin: 10px 0; box-sizing: border-box;">
    
    <input type="text" id="rawInsta" placeholder="اسم حساب الإنستغرام فقط" style="width: 100%; padding: 10px; margin: 5px 0; box-sizing: border-box;">
    <input type="text" id="rawFb" placeholder="اسم صفحة الفيسبوك فقط" style="width: 100%; padding: 10px; margin: 5px 0; box-sizing: border-box;">
    <input type="tel" id="rawWa" placeholder="رقم الواتساب مع رمز الدولة (مثال: 96477...)" style="width: 100%; padding: 10px; margin: 5px 0; box-sizing: border-box;">
    <input type="text" id="rawTiktok" placeholder="اسم حساب تيك توك فقط" style="width: 100%; padding: 10px; margin: 5px 0; box-sizing: border-box;">

    <button id="saveSocialsBtn" style="width: 100%; padding: 12px; margin-top: 15px; background: #2a5298; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold;">حفظ وتوليد الروابط الذكية</button>

    <div id="shareLinkContainer" style="margin-top: 20px; padding: 15px; background: #e8f8f5; border-radius: 5px; display: none; text-align: center;">
        <p style="color: #16a085; font-weight: bold;">رابط ملعبك الخاص جاهز للنشر!</p>
        <input type="text" id="generatedShareLink" readonly style="width: 70%; padding: 8px; text-align: center;">
        <button id="copyBtn" style="padding: 8px 15px; background: #16a085; color: white; border: none; border-radius: 4px; cursor: pointer;">نسخ</button>
    </div>
</div>

<!-- واجهة إدارة الأسعار بالدينار العراقي (د.ع) -->
<div style="background: #fff; padding: 20px; margin-top: 20px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: right; direction: rtl; font-family: sans-serif;">
    <h3><i class="fa-solid fa-money-bill-wave" style="color: #2ecc71;"></i> إدارة أسعار الساعات (الدينار العراقي)</h3>
    <label for="targetDay">اختر اليوم:</label>
    <select id="targetDay" style="width: 100%; padding: 10px; margin: 10px 0;"><option value="الجمعة">الجمعة</option><option value="السبت">السبت</option><option value="الأحد">الأحد</option><option value="الاثنين">الاثنين</option><option value="الثلاثاء">الثلاثاء</option><option value="الأربعاء">الأربعاء</option><option value="الخميس">الخميس</option></select>

    <label for="defaultPriceInput">السعر الافتراضي لكل الساعات (د.ع):</label>
    <input type="number" id="defaultPriceInput" placeholder="مثال: 25000" style="width: 100%; padding: 10px; margin-10px 0;">
    <button id="setPriceBtn" style="width: 100%; padding: 12px; background: #2ecc71; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold;">تطبيق السعر على الـ 24 ساعة</button>

    <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee;">
    <h4>تعديل ساعة معينة (أوقات الذروة)</h4>
    <select id="targetHour" style="width: 100%; padding: 10px; margin: 10px 0;"></select>
    <input type="number" id="customPriceInput" placeholder="مثال: 35000" style="width: 100%; padding: 10px; margin: 10px 0;">
    <button id="updateHourBtn" style="width: 100%; padding: 12px; background: #e67e22; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold;">تحديث سعر هذه الساعة فقط</button>
</div>

<script type="module">
    import { updateStadiumProfileWithAutoLinks, setInitialDayPricing, updateCustomHourPrice } from './app.js';

    // توليد الـ 24 ساعة برمجياً
    const hourSelect = document.getElementById('targetHour');
    for (let h = 0; h < 24; h++) {
        let option = document.createElement('option');
        option.value = h; option.textContent = `الساعة ${h % 12 === 0 ? 12 : h % 12}:00 ${h >= 12 ? 'مساءً' : 'صباحاً'}`;
        hourSelect.appendChild(option);
    }

    document.getElementById('saveSocialsBtn').addEventListener('click', async () => {
        const username = document.getElementById('stadiumUsername').value;
        const socials = { instagram: document.getElementById('rawInsta').value, facebook: document.getElementById('rawFb').value, whatsapp: document.getElementById('rawWa').value, tiktok: document.getElementById('rawTiktok').value };
        if(!username) return alert("ادخل اسم المستخدم!");
        const result = await updateStadiumProfileWithAutoLinks('field_1', username, socials);
        if(result.success) {
            document.getElementById('generatedShareLink').value = result.shareableLink;
            document.getElementById('shareLinkContainer').style.display = 'block';
        }
    });

    document.getElementById('setPriceBtn').addEventListener('click', async () => {
        const day = document.getElementById('targetDay').value;
        const price = document.getElementById('defaultPriceInput').value;
        if(!price) return alert("ادخل السعر!");
        await setInitialDayPricing('field_1', day, Number(price));
    });

    document.getElementById('updateHourBtn').addEventListener('click', async () => {
        const day = document.getElementById('targetDay').value;
        const hour = document.getElementById('targetHour').value;
        const price = document.getElementById('customPriceInput').value;
        if(!price) return alert("ادخل السعر الجديد!");
        await updateCustomHourPrice('field_1', day, Number(hour), Number(price));
    });
</script>
