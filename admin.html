<!-- نموذج إدخال مبسط يطلب أسماء المستخدمين فقط لتسهيل العملية -->
<div style="background: #fff; padding: 20px; margin-top: 20px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: right;">
    <h3>ربط مواقع التواصل للملعب (ادخل اسم الحساب فقط)</h3>
    
    <label for="stadiumUsername">اسم مستخدم الملعب بالتطبيق:</label>
    <input type="text" id="stadiumUsername" placeholder="مثال: baghdad_stadium" required style="width: 100%; padding: 10px; margin: 10px 0; box-sizing: border-box;">
    
    <label>روابط التواصل الاجتماعي للعيادة/الملعب:</label>
    <input type="text" id="rawInsta" placeholder="اسم حساب الإنستغرام فقط (مثال: stars_pitch)" style="width: 100%; padding: 10px; margin: 5px 0; box-sizing: border-box;">
    <input type="text" id="rawFb" placeholder="اسم صفحة الفيسبوك فقط (مثال: starsPitchPage)" style="width: 100%; padding: 10px; margin: 5px 0; box-sizing: border-box;">
    <input type="tel" id="rawWa" placeholder="رقم الواتساب مع رمز الدولة (مثال: 964770000000)" style="width: 100%; padding: 10px; margin: 5px 0; box-sizing: border-box;">
    <input type="text" id="rawTiktok" placeholder="اسم حساب تيك توك فقط (مثال: stars_sports)" style="width: 100%; padding: 10px; margin: 5px 0; box-sizing: border-box;">

    <button class="btn btn-approve" onclick="saveStadiumSocialsAuto()" style="width: 100%; padding: 12px; margin-top: 15px;">حفظ وتوليد الروابط الذكية</button>

    <!-- صندوق عرض رابط المشاركة الجاهز لنسخه -->
    <div id="shareLinkContainer" style="margin-top: 20px; padding: 15px; background: #e8f8f5; border-radius: 5px; display: none; text-align: center;">
        <p style="margin: 0 0 10px 0; font-weight: bold; color: #16a085;">رابط ملعبك الخاص جاهز للنشر!</p>
        <input type="text" id="generatedShareLink" readonly style="width: 80%; padding: 8px; text-align: center; font-size: 14px; border: 1px solid #bdc3c7; border-radius: 4px;">
        <button onclick="copyToClipboard()" class="btn btn-approve" style="padding: 8px 15px; font-size: 14px; margin-right: 5px;">نسخ الرابط</button>
    </div>
</div>

<script>
async function saveStadiumSocialsAuto() {
    const username = document.getElementById('stadiumUsername').value;
    const socialData = {
        instagram: document.getElementById('rawInsta').value,
        facebook: document.getElementById('rawFb').value,
        whatsapp: document.getElementById('rawWa').value,
        tiktok: document.getElementById('rawTiktok').value
    };

    if (!username) {
        alert("يرجى تحديد اسم مستخدم لملعبك أولاً!");
        return;
    }

    // استدعاء دالة المعالجة المحدثة في app.js
    const result = await updateStadiumProfileWithAutoLinks('field_1', username, socialData);
    
    alert(result.message);
    
    if (result.success) {
        document.getElementById('generatedShareLink').value = result.shareableLink;
        document.getElementById('shareLinkContainer').style.display = 'block';
    }
}
</script>
